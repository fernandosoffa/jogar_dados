<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Dado</title>

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="card">
        <h1>Jogo do Dado</h1>
          
        <p id="mensagem">Clique no botão para jogar o dado!</p>
        <div class="status">
            <p>Tentativas: <span id="tentativas">10</span></p>
            <p>Placar: <span id="placar">0</span></p>
            <p>Recorde: <span id="recorde">0</span></p>
        </div>
        <button onclick="jogarDado()">Jogar</button>
    </div>

    <div id="efeito"></div>
    <script src="script.js"></script>
</body>
</html>
